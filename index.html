<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Générateur QR Code Professionnel | 100% Sécurisé</title>
    <meta name="description" content="Créez des QR Codes personnalisés et gratuits pour votre entreprise. Outil sans serveur, vos données restent privées et ne quittent pas votre navigateur.">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';">

    <link rel="stylesheet" href="css/style.css">

    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="fake-logo">QR</div>
            <div class="header-title">
                <h1>Générateur de QR Code</h1>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="config-panel">
            
            <div class="config-section">
                <h3>1. Lien de destination</h3>
                <label for="input-url">URL de la page Web</label>
                <input type="url" id="input-url" placeholder="Ex: https://www.votre-site.fr" value="https://www.edf.fr">
            </div>

            <div class="config-section">
                <h3>2. Apparence visuelle</h3>
                
                <label for="color-dots">Couleur du QR Code</label>
                <div class="color-picker-group">
                    <input type="color" id="color-dots" value="#001A70">
                    <div class="palette">
                        <div class="color-dot" style="background:#001A70" data-color="#001A70" title="Bleu Nuit"></div>
                        <div class="color-dot" style="background:#005AFF" data-color="#005AFF" title="Bleu Action"></div>
                        <div class="color-dot" style="background:#FF5A00" data-color="#FF5A00" title="Orange"></div>
                        <div class="color-dot" style="background:#88D910" data-color="#88D910" title="Vert Éco"></div>
                        <div class="color-dot" style="background:#ffffff" data-color="#FFFFFF" title="Blanc"></div>
                       <div class="color-dot" style="background:#000000" data-color="#000000" title="Noir"></div>
                    </div>
                </div>

                <label for="color-bg">Couleur de fond</label>
                <div class="color-picker-group">
                    <input type="color" id="color-bg" value="#ffffff" disabled>
                    <label class="checkbox-group" style="margin:0; margin-left:5px;" for="bg-transparent">
                        <input type="checkbox" id="bg-transparent" checked> Fond transparent
                    </label>
                </div>

                <div class="row">
                    <div class="col">
                        <label for="style-dots">Forme des motifs</label>
                        <select id="style-dots">
                            <option value="square" selected>Classique (Carré)</option>
                            <option value="rounded">Arrondi</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="style-corners">Bords (Repères)</label>
                        <select id="style-corners">
                            <option value="square" selected>Angles droits</option>
                            <option value="extra-rounded">Angles arrondis</option>
                            <option value="dot">Circulaire</option>
                        </select>
                    </div>
                </div>

                <label for="error-correction">Niveau de correction (Densité)</label>
                <select id="error-correction">
                    <option value="L">Bas (Code allégé)</option>
                    <option value="M" selected>Standard (Recommandé)</option>
                    <option value="Q">Élevé</option>
                    <option value="H">Maximum (Requis si ajout de logo)</option>
                </select>
            </div>

            <div class="config-section">
                <h3>3. Personnalisation avancée</h3>
                
                <label for="logo-input">Ajouter une icône ou un logo au centre</label>
                <input type="file" id="logo-input" accept="image/png, image/jpeg, image/svg+xml">
                <button id="btn-clear-logo" class="btn-text" style="margin-bottom: 20px;">Retirer l'image</button>

                <label for="text-bottom">Texte descriptif (sous le QR Code)</label>
                <input type="text" id="text-bottom" placeholder="Laisser vide pour afficher le nom de domaine">
                
                <div class="row">
                    <div class="col">
                        <label for="text-font">Typographie</label>
                        <select id="text-font">
                            <option value="Arial, sans-serif" selected>Arial (Standard)</option>
                            <option value="'Helvetica Neue', sans-serif">Helvetica</option>
                            <option value="Georgia, serif">Georgia</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="text-size">Taille (<span id="text-size-val">22</span>px)</label>
                        <input type="range" id="text-size" min="14" max="40" value="22">
                    </div>
                </div>
            </div>

        </div>

        <div class="preview-panel">
            <h3 style="margin-top:0; margin-bottom: 25px; text-align: center;">Aperçu du résultat</h3>
            
            <div id="raw-qr-container"></div>
            <div id="final-canvas-container" class="checkerboard">
                <canvas id="final-canvas"></canvas>
            </div>

            <div class="export-controls">
                <label for="export-size">Format de téléchargement</label>
                <select id="export-size" style="margin-bottom: 25px;">
                    <option value="500" selected>Qualité Web (500x500 px)</option>
                    <option value="1000">Haute Définition (1000x1000 px)</option>
                    <option value="2000">Format Impression (2000x2000 px)</option>
                </select>
                
                <button id="btn-dl-png" class="btn btn-primary">Télécharger l'image (PNG)</button>
                <button id="btn-dl-svg" class="btn btn-secondary">Télécharger le vecteur (SVG)</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="privacy-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Ce site fonction sans cookies et aucune donnée saisie ne quitte votre ordinateur.
        </div>
        <div>
            &copy; 2026 Thomas Marchand — Tous droits réservés.
        </div>
        <div style="margin-top: 10px;">
            <a href="mentions-legales.html">Mentions légales</a> 
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
